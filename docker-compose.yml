services:
  n8n:
    image: n8nio/n8n:latest
    user: "1000:1000"
    restart: unless-stopped
    ports:
      - "127.0.0.1:5678:5678"
    env_file: .env
    environment:
      - N8N_HOST=${N8N_HOST}
      - N8N_PORT=${N8N_PORT}
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=${N8N_WEBHOOK_URL}
      - GENERIC_TIMEZONE=Europe/Madrid
      - TZ=Europe/Madrid
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
      - NODE_FUNCTION_ALLOW_BUILTIN=fs,path,crypto,https,http
      # n8n 1.x: owner account is created on first launch via UI
      # Generate an API key in Settings → API after first login, then set N8N_API_KEY in .env
    volumes:
      - n8n_data:/home/node/.n8n
      - ./data:/data:rw
      - ./prompts:/prompts:ro
    networks:
      - internal
      - proxy-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  internal:
    driver: bridge
  proxy-net:
    external: true

volumes:
  n8n_data:
