services:
  n8n:
    build: .
    image: n8n-homelab:latest
    user: "1000:1000"
    restart: unless-stopped
    ports:
      - "127.0.0.1:5678:5678"
    env_file:
      - ../shared/.env   # shared vars (ANTHROPIC_API_KEY, SPOTIFY_*, etc.)
      - .env             # bot-specific overrides (TELEGRAM_BOT_TOKEN, N8N_API_KEY)
    environment:
      # These are not in .env — set explicitly
      - N8N_PROTOCOL=https
      - GENERIC_TIMEZONE=Europe/Madrid
      - TZ=Europe/Madrid
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
      - NODE_FUNCTION_ALLOW_BUILTIN=fs,path,crypto,https,http
      - NODE_FUNCTION_ALLOW_EXTERNAL=pg
    volumes:
      - n8n_data:/home/node/.n8n
      - ./data:/data:rw
      - ./prompts:/prompts:ro
    networks:
      - internal
      - proxy-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  internal:
    driver: bridge
  proxy-net:
    external: true

volumes:
  n8n_data:
